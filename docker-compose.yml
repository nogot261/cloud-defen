services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      USE_LLM: "1"
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: gemma3:1b
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama

volumes:
  ollama:
